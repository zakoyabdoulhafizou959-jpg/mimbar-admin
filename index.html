<!DOCTYPE html>
<html lang="fr" class="h-full bg-zinc-950 text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinbarStream - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-zinc-950 min-h-screen p-4">

<div class="max-w-4xl mx-auto space-y-6">
    <header class="flex items-center justify-between bg-zinc-900 p-4 rounded-2xl border border-zinc-800">
        <div>
            <h1 class="text-lg font-black text-white">MinbarStream <span style="color:#ff5722">Admin</span></h1>
            <p class="text-xs text-zinc-400">Gestion des albums</p>
        </div>
        <div class="flex gap-2">
            <button onclick="showPending()" id="btn-pending" class="px-3 py-1.5 rounded-lg text-xs font-bold text-white" style="background:#ff5722">En attente</button>
            <button onclick="showApproved()" id="btn-approved" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-zinc-800 text-zinc-400">Approuvés</button>
            <button onclick="showRejected()" id="btn-rejected" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-zinc-800 text-zinc-400">Rejetés</button>
        </div>
    </header>

    <!-- Login Admin -->
    <div id="admin-login" class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
        <h2 class="text-sm font-bold text-white mb-3">Connexion Admin</h2>
        <input type="email" id="adminEmail" placeholder="Email admin" class="w-full bg-zinc-800 rounded-lg px-3 py-2 text-sm text-white mb-2">
        <input type="password" id="adminPassword" placeholder="Mot de passe" class="w-full bg-zinc-800 rounded-lg px-3 py-2 text-sm text-white mb-3">
        <button onclick="adminLogin()" class="w-full py-2 rounded-lg text-sm font-bold text-white" style="background:#ff5722">Se connecter</button>
    </div>

    <!-- Liste albums -->
    <div id="admin-content" class="hidden space-y-3">
        <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 flex justify-between items-center">
            <p class="text-xs text-zinc-400">Total albums: <span id="total-count" class="text-white font-bold">0</span> / 20</p>
            <button onclick="loadAlbums()" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-zinc-800 text-white"><i class="fa-solid fa-rotate-right mr-1"></i>Actualiser</button>
        </div>
        <div id="albums-list" class="space-y-3"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC3ybM8gMQZ-IjVLLXqs0MZLPEzqGmyREA",
    authDomain: "mimbar-e1bee.firebaseapp.com",
    projectId: "mimbar-e1bee",
    storageBucket: "mimbar-e1bee.appspot.com",
    messagingSenderId: "287190157826",
    appId: "1:287190157826:web:c1fd927c6cf0ea0ecdb51b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let allAlbums = [];
let currentFilter = 'pending';

const TYPE_LABELS = {
    'preche': '📢 Prêche quotidien',
    'tafsir': '📖 Tafsir',
    'hadith': '📜 Hadith',
    'coran': '🕌 Lecture du Coran'
};

async function adminLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const pwd = document.getElementById('adminPassword').value;
    try {
        await auth.signInWithEmailAndPassword(email, pwd);
        document.getElementById('admin-login').classList.add('hidden');
        document.getElementById('admin-content').classList.remove('hidden');
        await loadAlbums();
    } catch(e) { alert("Erreur: " + e.message); }
}

async function loadAlbums() {
    try {
        const snapshot = await db.collection('albums').get();
        allAlbums = [];
        snapshot.forEach(doc => {
            allAlbums.push({ id: doc.id, ...doc.data() });
        });
        document.getElementById('total-count').innerText = allAlbums.length;
        renderAlbums();
    } catch(e) { console.error(e); }
}

function renderAlbums() {
    const container = document.getElementById('albums-list');
    const filtered = allAlbums.filter(a => a.status === currentFilter);
    
    if (filtered.length === 0) {
        container.innerHTML = '<div class="text-center text-zinc-500 py-8 text-xs">Aucun album</div>';
        return;
    }
    
    container.innerHTML = filtered.map(a => `
        <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 space-y-3">
            <div class="flex items-start justify-between">
                <div>
                    <h3 class="text-sm font-bold text-white">${a.imamName || 'Sans nom'}</h3>
                    <p class="text-xs text-zinc-400">${a.city || ''}, ${a.country || ''}</p>
                    <p class="text-xs mt-1" style="color:#ff5722">${TYPE_LABELS[a.type] || a.type || 'Non spécifié'}</p>
                </div>
                <span class="px-2 py-0.5 rounded text-[9px] font-bold ${a.status === 'pending' ? 'bg-yellow-500 text-zinc-950' : a.status === 'approved' ? 'bg-emerald-500 text-zinc-950' : 'bg-red-500 text-white'}">
                    ${a.status.toUpperCase()}
                </span>
            </div>
            ${a.description ? `<p class="text-xs text-zinc-400">${a.description}</p>` : ''}
            <p class="text-[10px] text-zinc-500">User: ${a.userId || 'N/A'} · Créé: ${a.createdAt?.toDate ? new Date(a.createdAt.toDate()).toLocaleDateString() : 'N/A'}</p>
            <div class="flex gap-2">
                ${a.status !== 'approved' ? `<button onclick="approveAlbum('${a.id}')" class="flex-1 py-2 rounded-lg text-xs font-bold text-white" style="background:#10b981"><i class="fa-solid fa-check mr-1"></i>Approuver</button>` : ''}
                ${a.status !== 'rejected' ? `<button onclick="rejectAlbum('${a.id}')" class="flex-1 py-2 rounded-lg text-xs font-bold bg-red-600 text-white"><i class="fa-solid fa-xmark mr-1"></i>Rejeter</button>` : ''}
                <button onclick="deleteAlbum('${a.id}')" class="px-3 py-2 rounded-lg text-xs font-bold bg-zinc-800 text-zinc-400"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
    `).join('');
}

async function approveAlbum(albumId) {
    if (!confirm("Approuver cet album ?")) return;
    try {
        await db.collection('albums').doc(albumId).update({ status: 'approved', approvedAt: new Date() });
        await loadAlbums();
    } catch(e) { alert("Erreur: " + e.message); }
}

async function rejectAlbum(albumId) {
    const reason = prompt("Raison du rejet (optionnel):");
    try {
        await db.collection('albums').doc(albumId).update({ status: 'rejected', rejectionReason: reason || '', rejectedAt: new Date() });
        await loadAlbums();
    } catch(e) { alert("Erreur: " + e.message); }
}

async function deleteAlbum(albumId) {
    if (!confirm("Supprimer définitivement cet album ?")) return;
    try {
        await db.collection('albums').doc(albumId).delete();
        await loadAlbums();
    } catch(e) { alert("Erreur: " + e.message); }
}

function showPending() {
    currentFilter = 'pending';
    updateButtons();
    renderAlbums();
}
function showApproved() {
    currentFilter = 'approved';
    updateButtons();
    renderAlbums();
}
function showRejected() {
    currentFilter = 'rejected';
    updateButtons();
    renderAlbums();
}

function updateButtons() {
    ['pending','approved','rejected'].forEach(s => {
        const btn = document.getElementById(`btn-${s}`);
        if (currentFilter === s) {
            btn.style.background = '#ff5722';
            btn.classList.remove('bg-zinc-800','text-zinc-400');
            btn.classList.add('text-white');
        } else {
            btn.style.background = '';
            btn.classList.add('bg-zinc-800','text-zinc-400');
            btn.classList.remove('text-white');
        }
    });
}
</script>
</body>
</html>
